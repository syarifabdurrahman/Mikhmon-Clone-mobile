name: ommon
description: ΩMMON - Open Mikrotik Monitor. A professional dark-themed Flutter app for RouterOS management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  # State Management
  flutter_riverpod: ^2.6.1
  # HTTP Client
  dio: ^5.7.0
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Charts
  fl_chart: ^0.70.1
  # Google Fonts
  google_fonts: ^6.2.1
  # Bottom Navigation
  convex_bottom_bar: ^3.2.0
  # Intl for NumberFormat
  intl: ^0.20.2
  # QR Code Generation
  qr_flutter: ^4.1.0
  # URL Launcher for printing
  url_launcher: ^6.3.1
  open_file: ^3.5.0
  # Screenshots for printing/sharing
  screenshot: ^3.0.0
  # Share functionality
  share_plus: ^10.1.3
  # Path provider for saving files
  path_provider: ^2.1.5
  # Permission handler for storage
  permission_handler: ^12.0.1
  # PDF generation
  pdf: ^3.11.0
  # Printing support
  printing: ^5.13.0
  print_bluetooth_thermal: ^1.1.9
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/iconapp.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true
